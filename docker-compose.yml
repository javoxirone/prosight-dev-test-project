services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prosight}
      POSTGRES_USER: ${POSTGRES_USER:-prosight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prosight}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prosight} -d ${POSTGRES_DB:-prosight}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput
      && python manage.py bootstrap_users
      && python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
